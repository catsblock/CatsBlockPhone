name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 18
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '18'

    # Removemos o bloqueio de versão fixa para que a action use e sincronize a estrutura correta do seu projeto
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # Força a criação limpa do Wrapper no diretório correto do projeto antes da compilação
    - name: Regenerate local Gradle Wrapper
      run: gradle wrapper --gradle-version 8.5

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Compila e gera o APK utilizando o wrapper recém-validado
    - name: Build and Assemble APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
