name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 18
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '18'

    # Instala o Gradle de forma global para termos acesso ao comando de reparo
    - name: Setup Gradle Environment
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5' # Força uma versão compatível com catálogos de dependências modernos

    # Cria manualmente a estrutura que está faltando antes de rodar o build
    - name: Recreate missing Wrapper files
      run: |
        mkdir -p gradle/wrapper
        gradle wrapper --gradle-version 8.5

    # Concede permissão de execução ao script do repositório
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Executa a limpeza e gera o APK utilizando o ambiente corrigido
    - name: Build and Assemble APK
      run: ./gradlew clean assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
