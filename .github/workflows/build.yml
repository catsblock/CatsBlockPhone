name: Android CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 18
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '18'

    # 1. Este passo baixa o Gradle global apenas para gerar o wrapper que falta no seu projeto
    - name: Setup Gradle (Global tool to generate wrapper)
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    # 2. Comando crucial: Gera o gradle-wrapper.jar e atualiza as libs locais no repositório virtual do CI
    - name: Regenerate local Gradle Wrapper
      run: gradle wrapper

    # 3. Força a permissão de execução do script gerado
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # 4. Agora o ./gradlew original do projeto funcionará reconhecendo o "libs" do seu .toml
    - name: Build with Gradle
      run: ./gradlew build

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        
